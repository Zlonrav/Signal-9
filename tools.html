<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
	<script src="js/authGuard.js"></script> 
	<link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>СИГНАЛ-9 // ТЕРМИНАЛ</title>
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="stylesheet" type="text/css" href="style-tools.css">
	<link rel="stylesheet" type="text/css" href="style-chat-terminal.css">
	<style>
/* Базовый стиль номера (возвращен неон) */
.dot-order {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: bold;
    color: #ffcc00; /* Контрастный желтый */
    text-shadow: 0 0 5px rgba(255, 204, 0, 0.8);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    white-space: nowrap;
    z-index: 100;
}

/* Показываем номер только в режиме текста */
.dot.show-order .dot-order {
    opacity: 0.9;
}

/* --- РАСШИРЕННОЕ ПОЗИЦИОНИРОВАНИЕ --- */

/* 1: Сильно влево и вверх */
.dot:nth-child(1) .dot-order { top: -25px; left: -25px; }

/* 2: Сильно вверх */
.dot:nth-child(2) .dot-order { top: -30px; left: 50%; transform: translateX(-50%); }

/* 3: Сильно вправо и вверх */
.dot:nth-child(3) .dot-order { top: -25px; right: -25px; }

/* 4: Сильно влево */
.dot:nth-child(4) .dot-order { top: 50%; left: -30px; transform: translateY(-50%); }

/* 5: Центр — оставляем под точкой, как было */
.dot:nth-child(5) .dot-order { bottom: -18px; left: 50%; transform: translateX(-50%); }

/* 6: Сильно вправо */
.dot:nth-child(6) .dot-order { top: 50%; right: -30px; transform: translateY(-50%); }

/* 7: Сильно влево и вниз */
.dot:nth-child(7) .dot-order { bottom: -25px; left: -25px; }

/* 8: Сильно вниз */
.dot:nth-child(8) .dot-order { bottom: -30px; left: 50%; transform: translateX(-50%); }

/* 9: Сильно вправо и вниз */
.dot:nth-child(9) .dot-order { bottom: -25px; right: -25px; }
nth-child(9) .dot-order { bottom: -15px; right: -15px; }






</style>
</head>
<body>
	
	<div class="chat-system">
		<div id="quest-field" class="question" onclick="handleChatClick()"></div>
		<div id="answer-field" class="answer-field"></div>
	</div>
	<!-- СИСТЕМНЫЙ ТЕРМИНАЛ -->
	<!-- 2. Данные для этой конкретной страницы -->
	<script>
		window.roomChat = [
			{ q: "> ТЕКУЩИЙ СТАТУС СТАНЦИИ", a: "ПРИЕМ СИГНАЛА СТАБИЛЕН. ИДЕТ ДЕШИФРОВКА ПОТОКА ГЛИФОВ." },
			{ q: "> ПОЧЕМУ ТЕКСТ МЕНЯЕТСЯ?", a: "КАЖДЫЕ 128 СЕКУНД ПРОИСХОДИТ ПЕРЕЗАГРУЗКА КАНАЛА СВЯЗИ." }
		];
	</script>
	<!-- СИСТЕМНЫЙ ТЕРМИНАЛ -->

	<canvas id="starfield"></canvas>
	<div id="scanner-line"></div>
	
	<div class="audio-control-fixed" id="audio-toggle">
		<span id="audio-status-icon">○</span>
		<span id="audio-status">АУДИОДАТЧИКИ: ВЫКЛ</span>
	</div>

	<div class="mode-wrapper">
		<span class="mode-label">текст</span>
		<div class="switch-container">
			<input type="checkbox" id="mode-switch" class="switch-input">
			<label for="mode-switch" class="switch-label"></label>
		</div>
		<span class="mode-label">трассит</span>
	</div>

	<div class="main-frame" id="mainFrame">
		<!-- Сетка общая для всех режимов -->
		<div id="grid-layer" class="dots-grid"></div>
		
		<div id="gen-view" style="width:100%; height:100%; position:relative;">
			<svg viewBox="0 0 80 80"><path id="genPath" d=""></path></svg>
		</div>
		<div id="read-view" class="hidden" style="width:100%; height:100%; position:relative;">
			<svg viewBox="0 0 80 80"><path id="readPath" d=""></path></svg>
		</div>

		<!-- ДОБАВИТЬ ЭТОТ БЛОК: Сюда JS будет рисовать цифры -->
		<div id="number-labels"></div>
	</div>


	<div class="ui-footer">
		<div id="gen-ui">
			<input type="text" id="textInput" placeholder="введите данные" autocomplete="off">
		</div>
		<div id="read-ui" class="hidden">
			<div id="statusLabel" class="status-label">соедините точки</div>
		</div>
	</div>

    <div class="external-controls">
        <button class="icon-btn" id="resetBtn">×</button>
        <button class="icon-btn" id="playBtn">▶</button>
    </div>

	<!-- Подключаем общие ресурсы из папки js соблюдая порядок -->
    <script src="js/loader.js"></script>

<script>
// --- КОНФИГУРАЦИЯ И СОСТОЯНИЕ ---
let genIndices = [];    // Память для текстового ввода
let readIndices = [];   // Память для ручного рисования
let dictionary = {};    // База слов для распознавания
const allDots = [];     // Ссылки на DOM-элементы точек

// Вспомогательная функция для получения строки пути 'd'
function getPathData(indices) {
    if (!indices || !indices.length) return '';
    const svgString = createSVG(indices);
    const match = svgString.match(/d="([^"]*)"/);
    return match ? match[1] : '';
}

// 1. ИНИЦИАЛИЗАЦИЯ СЕТКИ И МЕТОК
const grid = document.getElementById('grid-layer');

if (typeof POINTS !== 'undefined' && grid) {
    POINTS.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot';
        
        // Создаем лаконичную метку порядкового номера внутри точки
        const orderLabel = document.createElement('span');
        orderLabel.className = 'dot-order';
        d.appendChild(orderLabel);

        d.onclick = () => {
            const isReadMode = document.getElementById('mode-switch').checked;
            if (isReadMode && !readIndices.includes(i)) {
                readIndices.push(i);
                // В режиме рисования анимируем только последний сегмент
                renderPath('readPath', readIndices, true);
                updatePointsUI();
                if (typeof playGlyphSound === 'function') playGlyphSound([i, i]);
            }
        };
        
        grid.appendChild(d);
        allDots.push(d);
    });
}

// 2. УНИВЕРСАЛЬНАЯ ПЛАВНАЯ ОТРИСОВКА
function renderPath(pathId, indices, isContinuing = false) {
    const pathElem = document.getElementById(pathId);
    if (!pathElem) return;

    const dData = getPathData(indices);
    
    if (indices.length <= 1) {
        pathElem.setAttribute('d', dData);
        pathElem.style.strokeDasharray = 'none';
        return;
    }

    // Измеряем полную длину пути
    pathElem.setAttribute('d', dData);
    const totalLength = pathElem.getTotalLength();
    pathElem.style.transition = 'none';

    if (isContinuing) {
        // Логика "Роста": показываем всё, кроме последнего отрезка
        const prevIndices = indices.slice(0, -1);
        const prevDData = getPathData(prevIndices);
        pathElem.setAttribute('d', prevDData);
        const prevLength = pathElem.getTotalLength();

        // Возвращаем полный путь, скрываем только новый кусок
        pathElem.setAttribute('d', dData);
        pathElem.style.strokeDasharray = totalLength;
        pathElem.style.strokeDashoffset = totalLength - prevLength;
        
        // Время анимации зависит от длины нового куска
        const duration = (totalLength - prevLength) / DRAW_SPEED;
        
        requestAnimationFrame(() => {
            pathElem.style.transition = `stroke-dashoffset ${duration}s linear`;
            pathElem.style.strokeDashoffset = '0';
        });
    } else {
        // Логика полной отрисовки (для текстового поля)
        pathElem.style.strokeDasharray = totalLength;
        pathElem.style.strokeDashoffset = totalLength;
        const duration = totalLength / DRAW_SPEED;
        
        requestAnimationFrame(() => {
            pathElem.style.transition = `stroke-dashoffset ${duration}s linear`;
            pathElem.style.strokeDashoffset = '0';
        });
    }
}

// 3. ОБНОВЛЕНИЕ ВИЗУАЛА ТОЧЕК И НОМЕРОВ
function updatePointsUI() {
    const isReadMode = document.getElementById('mode-switch').checked;
    const currentIndices = isReadMode ? readIndices : genIndices;

    allDots.forEach(d => {
        d.classList.remove('active', 'show-order');
        const lbl = d.querySelector('.dot-order');
        if (lbl) lbl.innerText = '';
    });

    currentIndices.forEach((pointIdx, order) => {
        const dot = allDots[pointIdx];
        if (!dot) return;
        dot.classList.add('active');
        if (!isReadMode) {
            dot.classList.add('show-order');
            const lbl = dot.querySelector('.dot-order');
            if (lbl) lbl.innerText = order + 1;
        }
    });

    const statusLabel = document.getElementById('statusLabel');
    if (isReadMode && statusLabel) {
        const key = readIndices.join('-');
        if (dictionary[key]) {
            const foundWord = dictionary[key]; // <--- Сохраняем слово в переменную
            statusLabel.innerText = foundWord;
            statusLabel.classList.remove('error-state');
            
            // --- ПЕРЕДАЧА В АРХИВ ---
            localStorage.setItem('s9_glyph_' + foundWord, 'true'); 

        } else if (readIndices.length >= 5) {
            statusLabel.innerText = "НЕ РАСПОЗНАННО";
            statusLabel.classList.add('error-state');
        } else {
            statusLabel.innerText = "СОЕДИНИТЕ ТОЧКИ";
            statusLabel.classList.remove('error-state');
        }
    }
}


// 4. СЛОВАРЬ (Сбор всех слов из движка)
function initDictionary() {
    const allWords = [
        ...(typeof PHRASES !== 'undefined' ? PHRASES.flatMap(p => p.split(' ')) : []), 
        ...(typeof VOCABULARY !== 'undefined' ? VOCABULARY : [])
    ];
    allWords.forEach(w => {
        const clean = w.toUpperCase().replace(/[^А-ЯЁA-Z]/g, '');
        if(clean && typeof getPath === 'function') {
            const p = getPath(clean);
            if (p.length) dictionary[p.join('-')] = clean;
        }
    });
}

// 5. ОБРАБОТЧИКИ СОБЫТИЙ
document.getElementById('mode-switch').onchange = (e) => {
    const isRead = e.target.checked;
    document.getElementById('gen-view').classList.toggle('hidden', isRead);
    document.getElementById('gen-ui').classList.toggle('hidden', isRead);
    document.getElementById('read-view').classList.toggle('hidden', !isRead);
    document.getElementById('read-ui').classList.toggle('hidden', !isRead);
    
    // При переключении восстанавливаем графику нужного режима
    if (isRead) {
        renderPath('readPath', readIndices, false);
    } else {
        renderPath('genPath', genIndices, false);
    }
    updatePointsUI();
};

document.getElementById('textInput').oninput = (e) => {
    // 1. БЕРЕМ ЧИСТЫЙ ВВОД ПОЛЬЗОВАТЕЛЯ БЕЗ ПРОБЕЛОВ
    const rawVal = e.target.value.trim();

    // 2. ЖЕСТКАЯ ПРОВЕРКА КОДА ОРБИТЫ (ПЕРЕД ВСЕМИ ОСТАЛЬНЫМИ ФИЛЬТРАМИ)
    if (rawVal === "142.0458.13.70") {
        console.log("ВЕКТОР ПРИНЯТ: ОРБИТА СТАБИЛИЗИРОВАНА");

        const isReactorFixed = localStorage.getItem('s9_reactor_fixed') === 'true';

        if (!isReactorFixed) {
            // --- ФАЗА 1: ПЕРВОЕ ПРОХОЖДЕНИЕ (РЕАКТОР ЕЩЁ СЛОМАН) ---
            localStorage.removeItem('s9_emergency_flag'); // Солнечная ЧС устранена
            localStorage.setItem('s9_emergency_reactor', 'active'); // Включаем ЧС реактора
            localStorage.setItem('s9_orbit_stabilized', 'active');  // Сигнал-ключ для тильды и карты
            
            // Принудительно держим класс аварии, чтобы страница осталась красной
            document.body.classList.add('emergency-mode');

            // Мгновенно перерисовываем плашку на новую угрозу
            if (typeof window.applyEmergencyStyles === 'function') {
                window.applyEmergencyStyles();
            }

            // Выводим оранжевое предупреждение о реакторе
            const label = document.getElementById('statusLabel');
            if (label) {
                const genUI = document.getElementById('gen-ui');
                const readUI = document.getElementById('read-ui');
                const isReadMode = document.getElementById('mode-switch')?.checked;

                if (genUI) genUI.classList.add('hidden');
                if (readUI) readUI.classList.remove('hidden');
                
                label.innerText = "ОРБИТА СТАБИЛЬНА. ВНИМАНИЕ: ОШИБКА ЯДРА РЕАКТОРА!";
                label.style.color = "#ffaa00"; 
                label.style.textShadow = "0 0 15px #ffaa00";
                
                setTimeout(() => {
                    label.innerText = "соедините точки";
                    label.style.color = "";
                    label.style.textShadow = "";
                    if (!isReadMode && genUI && readUI) {
                        genUI.classList.remove('hidden');
                        readUI.classList.add('hidden');
                    }
                }, 4000);
            }
        } else {
            // --- ФАЗА 2: ПОВТОРНЫЙ ВВОД (РЕАКТОР УЖЕ ИСПРАВЛЕН РАНЕЕ) ---
            // Если игрок ввёл код в штатном режиме, просто показываем зелёный триумф
            localStorage.removeItem('s9_emergency_flag');
            localStorage.removeItem('s9_emergency_reactor');
            localStorage.removeItem('s9_orbit_stabilized');

            if (typeof window.applyEmergencyStyles === 'function') {
                window.applyEmergencyStyles();
            }

            const label = document.getElementById('statusLabel');
            if (label) {
                const genUI = document.getElementById('gen-ui');
                const readUI = document.getElementById('read-ui');
                const isReadMode = document.getElementById('mode-switch')?.checked;

                if (genUI) genUI.classList.add('hidden');
                if (readUI) readUI.classList.remove('hidden');
                
                label.innerText = "ВЕКТОР ПРИНЯТ: СИСТЕМА ФУНКЦИОНИРУЕТ ШТАТНО";
                label.style.color = "#00ff44"; // Красивый зелёный цвет успеха
                label.style.textShadow = "0 0 15px #00ff44";
                
                setTimeout(() => {
                    label.innerText = "соедините точки";
                    label.style.color = "";
                    label.style.textShadow = "";
                    if (!isReadMode && genUI && readUI) {
                        genUI.classList.remove('hidden');
                        readUI.classList.add('hidden');
                    }
                }, 4000);
            }
        }

        // 3. ОБЯЗАТЕЛЬНАЯ ИНЖЕНЕРНАЯ ОЧИСТКА ХОЛСТА
        e.target.value = ""; 
        if (typeof renderPath === 'function') renderPath('genPath', [], false); 
        if (typeof updatePointsUI === 'function') updatePointsUI(); 

        return; 
    }



    // --- ДАЛЕЕ ИДЕТ ТВОЙ СТАРЫЙ КОД ФИЛЬТРАЦИИ БУКВ ДЛЯ ГЛИФОВ ---
    // (Например: const val = rawVal.toUpperCase().replace(/[^А-ЯЁA-Z]/g, ''); и т.д.)

    // 2. ОБЫЧНАЯ ЛОГИКА ГЛИФОВ (Твоя оригинальная)
    const val = rawVal.toUpperCase().replace(/[^А-ЯЁA-Z]/g, '');
    genIndices = (val && typeof getPath === 'function') ? getPath(val) : [];
    renderPath('genPath', genIndices, false);
    updatePointsUI();
};

document.getElementById('resetBtn').onclick = () => {
    const isRead = document.getElementById('mode-switch').checked;
    if (isRead) {
        readIndices = [];
        renderPath('readPath', [], false);
    } else {
        genIndices = [];
        document.getElementById('textInput').value = '';
        renderPath('genPath', [], false);
    }
    updatePointsUI();
};

document.getElementById('playBtn').onclick = () => {
    const isRead = document.getElementById('mode-switch').checked;
    const currentSet = isRead ? readIndices : genIndices;
    if (typeof playGlyphSound === 'function' && currentSet.length > 0) {
        playGlyphSound(currentSet);
    }
};

// Запуск
initDictionary();
updatePointsUI();


</script>

</body>
</html>
