<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="js/authGuard.js"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>СИГНАЛ-9 // КАРТА СТАНЦИИ</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="style-tools.css">
    <link rel="stylesheet" type="text/css" href="style-chat-terminal.css">
    <style>
        /* Изолированные стили для топологии карты */
        #display {
            display: flex !important;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

		.map-wrapper {
			position: relative;
			width: 1100px; /* Увеличили ширину под горизонталь */
			height: 600px;
			margin: 0 auto;
		}

        /* Слой для соединительных линий (Трасситы) */
        .map-connections {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

		.map-connections line {
			stroke: var(--neon);
			stroke-width: 2;
			opacity: 0.15;
		}

        @keyframes connectionFlow {
            from { stroke-dashoffset: 200; }
            to { stroke-dashoffset: 0; }
        }

        /* Узлы отсеков */
		.map-node {
			position: absolute;
			width: 141.6px;
			height: 141.6px;
			background: rgba(10, 26, 32, 0.8);
			border: 1px solid rgba(0, 242, 255, 0.2);
			border-radius: 8px; /* Небольшое скругление для технологичности */
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			transition: all 0.3s ease;
			text-decoration: none;
			z-index: 10;
		}

        .map-node.unlocked {
            border-color: rgba(0, 242, 255, 0.4);
        }

        .map-node.unlocked:hover {
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            transform: scale(1.1);
        }

		.map-node.locked .node-glyph {
			color: #ff3300; /* Закрытые замки сделаем тускло-красными */
			opacity: 0.4;
		}
        /* Иконка и текст внутри узла */
		.node-glyph {
			width: 50px;
			height: 50px;
			margin-bottom: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--neon); /* Цвет берется из переменной */
		}
		.node-glyph svg {
			width: 100%;
			height: 100%;
			opacity: 0.8;
			filter: drop-shadow(0 0 3px var(--neon)); /* Легкое свечение вместо жирного фильтра */
		}

        .node-label {
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--neon);
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            pointer-events: none;
        }

        .req-info {
            font-size: 6px;
            opacity: 0.5;
            margin-top: 4px;
        }

        /* Всплывающее описание при наведении */
        .node-desc {
            position: absolute;
            bottom: -30px;
            white-space: nowrap;
            font-size: 7px;
            opacity: 0;
            transition: 0.3s;
            color: var(--neon);
        }
        .map-node:hover .node-desc { opacity: 0.8; bottom: -20px; }
		.node-meta {
			font-size: 6px;
			opacity: 0.3;
			letter-spacing: 1px;
			margin-top: 4px;
			font-family: monospace;
		}

		.map-node.unlocked:hover .node-meta {
			opacity: 0.8;
			color: #fff;
		}
    </style>
</head>
<body class="tools-page">
    <div id="solar-flare-bg"></div>
    <canvas id="starfield"></canvas>
    
    <!-- Интерфейсные слои -->
    <div id="scanner-line"></div>
    <div id="overlay-noise"></div>

<div class="chat-system">
		<div id="quest-field" class="question" onclick="handleChatClick()"></div>
		<div id="answer-field" class="answer-field"></div>
	</div>
	<!-- СИСТЕМНЫЙ ТЕРМИНАЛ -->
	<!-- 2. Данные для этой конкретной страницы -->
	<script>
		window.roomChat = [
			{ 
				q: "> ЧТО ЭТО?", 
				a: "ЭТО КАРТА СТАНЦИИ 'СИГНАЛ-9'." 
			}
		];
	</script>
	<!-- СИСТЕМНЫЙ ТЕРМИНАЛ -->

    <!-- ОСНОВНОЕ ПОЛЕ КАРТЫ -->
    <div id="display">
        <div class="map-wrapper" id="mapWrapper">
            <!-- Слой SVG для линий связи -->
            <svg class="map-connections" id="mapLines" viewBox="0 0 1000 700"></svg>
            
            <!-- Сюда mapEngine.js добавит узлы -->
            <div id="mapNodesContainer"></div>
        </div>
    </div>

    <!-- Нижняя панель и ссылки -->
    <div class="audio-control-fixed" id="audio-toggle">
        <span id="audio-status-icon">○</span>
        <span id="audio-status">АУДИОДАТЧИКИ: ВЫКЛ</span>
    </div>

    <!-- КНОПКА ТЕРМИНАЛА (ПРАВО) -->
    <a href="tools.html" target="_blank" class="terminal-link-fixed">
        <span>□</span> ИНЖЕНЕРНЫЙ ТЕРМИНАЛ
    </a>

    <!-- Скрипты -->
    <script src="js/loader.js"></script>
    <script src="js/mapEngine.js"></script>
</body>
</html>
