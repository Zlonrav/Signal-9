<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="js/authGuard.js"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>СИГНАЛ-9 // РЕАКТОРНЫЙ ОТСЕК</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="style-tools.css">
    <link rel="stylesheet" type="text/css" href="style-chat-terminal.css">
       <style>
        /* Стили реакторного зала */
        #display {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            height: 100vh;
            gap: 20px;
        }

        /* Центральное ядро */
        .reactor-core {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            /* Если переменная --neon не задана, по умолчанию круг будет СИНИМ */
            border: 2px solid var(--neon, #00f2ff); 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            /* Если переменная --neon-glow не задана, градиент будет СИНИМ */
            background: radial-gradient(circle, var(--neon-glow, rgba(0, 242, 255, 0.1)) 0%, transparent 70%);
            transition: all 0.5s ease;
        }

        /* Пульсация ядра полностью слушается системного цвета */
        .core-pulse {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 1px solid var(--neon, #00f2ff);
            animation: coreAlert 2s infinite ease-out;
            transition: border-color 0.5s ease;
        }

        @keyframes coreAlert {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* Потоки кода на фоне */
        .code-glitch-stream {
            position: absolute;
            top: 50%; width: 100%;
            height: 400px;
            transform: translateY(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--neon, #00f2ff);
            opacity: 0.15;
            overflow: hidden;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            transition: color 0.5s ease;
        }

        /* Поле для ввода патча (Исправленная логика отображения) */
        .patch-interface {
            position: absolute !important;   /* Фиксируем внизу экрана */
            bottom: 60px !important;         /* Отступ от нижнего края */
            left: 50% !important;            /* Центрируем */
            transform: translateX(-50%) !important; 
            z-index: 10100 !important;       /* Выше плашки */
            text-align: center !important;
            background: rgba(2, 5, 8, 0.95) !important; 
            padding: 30px !important;        
            border: 1px solid var(--neon, #ff3300) !important;
            box-shadow: 0 0 30px var(--neon-glow, rgba(255, 30, 0, 0.2)) !important;
            transition: all 0.5s ease;
            
            /* ЖЕСТКИЕ РАЗМЕРЫ ПАНЕЛИ */
            width: 500px !important;         
            height: auto !important;         
            box-sizing: border-box !important; 

            /* ИСПРАВЛЕНО: Убрали !important, чтобы скрипт мог скрывать блок через display: none */
            display: flex;
            flex-direction: column;
            gap: 15px;            
        }


        /* Заголовок внутри таблички ("ОБНАРУЖЕНО ПОВРЕЖДЕНИЕ ЯДРА") */
        .status-header {
            display: block !important; /* Выталкивает инпут на новую строку */
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 14px !important;       
            letter-spacing: 3px !important;
            color: var(--neon, #ff3300) !important;
            margin: 0 0 5px 0 !important; /* Уменьшили нижнее поле, так как теперь работает общая сетка gap */
            text-transform: uppercase;
        }

        /* Поле для ввода слова БЭКАП */
        #patchInput {
            /* КРИТИЧЕСКИЙ ФИКС: Отменяем глобальный position: absolute для инпута */
            position: static !important;  
            display: block !important;    /* Возвращаем в стандартный блочный поток */
            
            background: transparent !important;
            border: none !important;
            border-bottom: 2px solid var(--neon, #ff3300) !important; /* Четкая линия снизу */
            color: var(--neon, #ff3300) !important;
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 20px !important;       /* Большие буквы для ввода */
            text-align: center !important;
            
            /* Жесткие размеры самого поля ввода */
            width: 280px !important;      
            height: 40px !important;
            
            outline: none !important;
            text-transform: uppercase !important;
            letter-spacing: 8px !important;
            
            /* Создаем аккуратный отступ сверху от текста */
            margin: -20px auto 0 auto !important; 
            padding: 5px 0 !important;
            transition: all 0.3s ease;
        }


        #patchInput:focus {
            border-bottom-color: var(--neon, #ff6600) !important;
            box-shadow: 0 5px 15px var(--neon-glow, rgba(255, 50, 0, 0.15)) !important;
        }
    </style>

</head>
<body class="tools-page">
    <div id="solar-flare-bg"></div>
    <canvas id="starfield"></canvas>
    
    <!-- Потоки битого кода на фоне -->
    <div class="code-glitch-stream">
        <div id="stream-left"></div>
        <div id="stream-right"></div>
    </div>

	<div id="display">
		<!-- Центральное ядро -->
		<div class="reactor-core">
			<div class="core-pulse"></div>
			<div class="core-pulse" style="animation-delay: 1s"></div>
			<!-- Сюда вставим глиф через JS -->
			<div id="core-glyph" style="width: 150px; height: 150px; display: flex; align-items: center; justify-content: center;"></div>
		</div>

		<!-- Интерфейс ввода -->
		<div class="patch-interface">
			<div class="status-header" id="patchStatus">ОБНАРУЖЕНО ПОВРЕЖДЕНИЕ ЯДРА</div>
			<div style="font-size: 12px; opacity: 0.7; letter-spacing: 1px;">ИНСТРУКЦИЯ В СИСТЕМНОМ ТЕРМИНАЛЕ</div>
			
			<!-- Поле ввода (теперь оно точно будет видно) -->
			<div style="margin-top: 20px;">
				<input type="text" id="patchInput" autocomplete="off" spellcheck="false" placeholder="...">
			</div>
		</div>
	</div>

    <div class="chat-system">
        <div id="quest-field" class="question" onclick="handleChatClick()"></div>
        <div id="answer-field" class="answer-field"></div>
    </div>

<script>
    // --- ДИНАМИЧЕСКИЕ ЛОГИ ТЕРМИНАЛА РЕАКТОРА ---
    (function initReactorChat() {
        const isFixed = localStorage.getItem('s9_reactor_fixed') === 'true';
        const isEmergency = localStorage.getItem('s9_emergency_reactor') === 'active' || 
                            localStorage.getItem('s9_emergency_flag') === 'active';

        if (isFixed) {
            // === СОСТОЯНИЕ 3: РЕАКТОР ПОЧИНЕН ===
            window.roomChat = [
                { q: "> ТЕКУЩАЯ ТЕМПЕРАТУРА ЯДРА", a: "420°C. СТАБИЛИЗАЦИЯ ЗАВЕРШЕНА. ОХЛАЖДЕНИЕ В НОРМЕ." },
                { q: "> ДИАГНОСТИКА ПО СИСТЕМЫ", a: "ОШИБКИ ИСПРАВЛЕНЫ. РЕЗЕРВНАЯ КОПИЯ УСПЕШНО ИНТЕГРИРОВАНА В ЯДРО." },
                { q: "> СТАТУС МАГНИТНЫХ ЛОВУШЕК", a: "ПОДДЕРЖАНИЕ ВЕКТОРА ПОЛЯ: 100%. УГРОЗА СМЕЩЕНИЯ ОРБИТЫ СНЯТА." }
            ];
        } 
        else if (isEmergency) {
            // === СОСТОЯНИЕ 2: АВАРИЯ (АКТИВНЫЙ КВЕСТ) ===
            window.roomChat = [
                { q: "> ТЕКУЩАЯ ТЕМПЕРАТУРА ЯДРА", a: "1450°C. КРИТИЧЕСКИЙ ПРЕДЕЛ. МАГНИТНЫЕ ЛОВУШКИ НЕСТАБИЛЬНЫ." },
                { q: "> ПОЧЕМУ КОД ПОВРЕЖДЕН?", a: "ИОНИЗИРУЮЩЕЕ ИЗЛУЧЕНИЕ ВЫЗВАЛО МНОЖЕСТВЕННЫЕ ОШИБКИ В СЕКТОРАХ ПАМЯТИ." },
                { q: "> КАК СБРОСИТЬ ОШИБКУ ПО?", a: "ТРЕБУЕТСЯ ЗАГРУЗКА РЕЗЕРВНОГО ОБРАЗА. ВВЕДИТЕ КОМАНДУ ВОССТАНОВЛЕНИЯ ЯДРА." }
            ];
        } 
        else {
            // === СОСТОЯНИЕ 1: ОЖИДАЕТ КВЕСТА (МИРНОЕ СИНЕЕ ВРЕМЯ) ===
            window.roomChat = [
                { q: "> ТЕКУЩАЯ ТЕМПЕРАТУРА ЯДРА", a: "380°C. ФУНКЦИОНИРОВАНИЕ В ШТАТНОМ ДИАПАЗОНЕ." },
                { q: "> СТАТУС ЭНЕРГОСЕТИ СТАНЦИИ", a: "ПОТРЕБЛЕНИЕ СЕКТОРОВ: 42%. ВСЕ ЭНЕРГОБЛОКИ РАБОТАЮТ В НОРМАЛЬНОМ РЕЖИМЕ." },
                { q: "> ПОСЛЕДНЯЯ ПЕРЕПРОШИВКА ПО", a: "ОБНОВЛЕНИЕ БАЗОВОЙ МАТРИЦЫ: ВЫПОЛНЕНО 420 ЦИКЛОВ НАЗАД. ОШИБОК НЕ ОБНАРУЖЕНО." }
            ];
        }
        
        console.log(`📡 Терминал логов реактора инициализирован для режима: ${isFixed ? "ПОЧИНЕН" : (isEmergency ? "АВАРЕЛЬНЫЙ" : "МИРНЫЙ")}`);
    })();
</script>


    <script src="js/loader.js"></script>
    <script src="js/reactorEngine.js"></script>
</body>
</html>
